 name: SANAL_GOKHAN_RADAR_TEK_CATI

on:
  workflow_dispatch:
  schedule:
    - cron: '0,30 * * * *'

jobs:
  scan-and-send:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri yükle
        run: |
          pip install -r requirements.txt

      - name: Tek cati radar calistir
        run: |
          python gokhan_bist_radar_v13.py

      