name: SANAL_GOKHAN_RADAR_TEK_CATI

on:
  workflow_dispatch:
  schedule:
    - cron: '15 7 * * 1-5'
    - cron: '30 7 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '30 8 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '30 9 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 11 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 13 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '15 15 * * 1-5'

jobs:
  scan-and-send:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kutuphaneleri yukle
        run: |
          pip install -r requirements.txt

      - name: Tek cati radar calistir
        run: |
          python gokhan_bist_radar_v13.py

      - name: Radar hafizasini kaydet
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add radar_memory.csv radar_signals.csv radar_performance.csv

          git commit -m "Radar memory update" || echo "No changes"

          git push