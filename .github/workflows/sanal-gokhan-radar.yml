name: SANAL_GOKHAN_RADAR_TEK_CATI

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 7-14 * * 1-5"

jobs:
  scan-and-send:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri yükle
        run: |
          pip install -r requirements.txt

      - name: Tek çatı radar çalıştır
        run: |
          python gokhan_bist_radar_v13.py

      - name: Radar hafızasını kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add radar_memory.csv
          git commit -m "Update radar memory" || echo "No memory changes"
          git push