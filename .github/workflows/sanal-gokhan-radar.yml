name: SANAL_GOKHAN_RADAR_TEK_CATI

on:
  workflow_dispatch:
  schedule:
    - cron: '7 7 * * 1-5'    # 10:07 TR
    - cron: '22 7 * * 1-5'   # 10:22 TR (açılış sonrası yoğun saat)
    - cron: '52 7 * * 1-5'   # 10:52 TR
    - cron: '37 8 * * 1-5'   # 11:37 TR
    - cron: '22 9 * * 1-5'   # 12:22 TR
    - cron: '7 11 * * 1-5'   # 14:07 TR
    - cron: '37 12 * * 1-5'  # 15:37 TR
    - cron: '22 14 * * 1-5'  # 17:22 TR (kapanış öncesi)


jobs:
  scan-and-send:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kutuphaneleri yukle
        run: |
          pip install -r requirements.txt

      - name: Tek cati radar calistir
        run: |
          python gokhan_bist_radar_v13.py

      - name: Radar hafizasini kaydet
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add radar_memory.csv radar_signals.csv radar_performance.csv
          git commit -m "Radar memory update" || echo "No changes"

          git pull --rebase origin main || true
          git push || git push --force-with-lease