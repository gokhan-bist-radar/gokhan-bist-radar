name: GOKHAN_BIST_RADAR_PRO

on:
  workflow_dispatch:

  schedule:
    - cron: "15,30,45 7-9 * * 1-5"
    - cron: "15,30,45 11-14 * * 1-5"

jobs:
  scan-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri yükle
        run: |
          pip install -r requirements.txt

      - name: Otomatik tarama çalıştır
        run: |
          python bist_telegram_radar_v10_4.py